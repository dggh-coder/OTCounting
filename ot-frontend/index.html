<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OT Input</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <header class="topbar">
    <div class="logo-slot">LOGO</div>
    <nav class="top-links">
      <button class="top-link active" data-view="home" type="button">Home</button>
      <button class="top-link" data-view="driver" type="button">OT (Driver)</button>
    </nav>
  </header>

  <main>
    <section id="view-home" class="page-view">
      <section class="hero">
        <h1>Welcome</h1>
        <p>OT platform</p>
        <div class="pulse-wrap" aria-hidden="true"><span></span><span></span><span></span></div>
        <p id="live-clock" class="clock">--:--:--</p>
      </section>
    </section>

    <section id="view-driver" class="page-view hidden">
      <h1>Driver OT Management</h1>
      <nav class="tabs">
        <button id="tab-btn-ot" class="tab-btn active" data-tab="ot" type="button">OT Input</button>
        <button id="tab-btn-staff" class="tab-btn" data-tab="staff" type="button">Staff Input</button>
      </nav>

      <section id="tab-ot" class="tab-content">
        <section class="card">
          <h2>OT Input</h2>
          <button id="add-group" type="button">New Record</button>
        </section>
        <div id="ot-groups"></div>
      </section>

      <section id="tab-staff" class="tab-content hidden">
        <section class="card">
          <h2>Staff Input</h2>
          <div class="row">
            <label>Staff No (ID)
              <input id="staff-id" type="text" placeholder="6 digits">
            </label>
            <label>Staff Name (Eng)
              <input id="staff-nameeng" type="text" placeholder="optional">
            </label>
            <label>Staff Name (Chi)
              <input id="staff-namechi" type="text" placeholder="optional">
            </label>
            <label>Display Name
              <input id="staff-displayname" type="text" placeholder="optional">
            </label>
            <label>Domain Name
              <input id="staff-domainname" type="text" placeholder="optional">
            </label>
            <label>Staff Group
              <input id="staff-staffgroup" type="text" placeholder="optional">
            </label>
            <button id="save-staff" type="button">Save Staff</button>
          </div>
          <div id="staff-msg" class="msg"></div>
        </section>
        <section class="card">
          <h2>Current Staff</h2>
          <div id="staff-list"></div>
        </section>
      </section>
    </section>
  </main>
  <script src="./app.js?v=20260501b"></script>
</body>
</html>
