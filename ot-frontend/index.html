<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OT Calculator</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main>
    <h1>OT Calculator (UAT)</h1>

    <section>
      <h2>Entries (OT + Break)</h2>
      <button id="add-entry" type="button">Add Entry</button>
      <table>
        <thead>
          <tr><th>Date</th><th>Session</th><th>Type</th><th>Employee</th><th>Start (24h)</th><th>End (24h)</th><th>Action</th></tr>
        </thead>
        <tbody id="entry-body"></tbody>
      </table>
    </section>

    <section>
      <h2>Daily Summary</h2>
      <div id="daily-results"></div>
    </section>

    <section>
      <h2>Monthly Summary</h2>
      <div id="monthly-results"></div>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
