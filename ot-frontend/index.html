<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OT Input</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main>
    <h1>OT Management</h1>
    <nav class="tabs">
      <button id="tab-btn-ot" class="tab-btn active" data-tab="ot" type="button">OT Input</button>
      <button id="tab-btn-staff" class="tab-btn" data-tab="staff" type="button">Staff Input</button>
    </nav>

    <section id="tab-ot" class="tab-content">
      <section id="step-select" class="card">
        <h2>1) Select Staff + Date</h2>
        <div class="row">
          <label>Staff
            <select id="staff-select"></select>
          </label>
          <label>Date
            <input id="work-date" type="date">
          </label>
          <button id="to-period" type="button">Next</button>
        </div>
        <div id="select-msg" class="msg"></div>
      </section>

      <section id="step-input" class="card hidden">
        <h2>2) Input Details</h2>
        <div id="context"></div>
        <button id="add-row" type="button">Add Row</button>
        <table>
          <thead>
            <tr><th>Type</th><th>Start (HH:MM)</th><th>End (HH:MM)</th><th></th></tr>
          </thead>
          <tbody id="entry-body"></tbody>
        </table>
        <div class="actions">
          <button id="confirm" type="button">確認 Confirm</button>
          <button id="cancel-input" type="button">Back</button>
        </div>
        <div id="input-msg" class="msg"></div>
      </section>
    </section>

    <section id="tab-staff" class="tab-content hidden">
      <section class="card">
        <h2>Staff Input</h2>
        <div class="row">
          <label>Staff No (ID)
            <input id="staff-id" type="text" placeholder="e.g. S1001">
          </label>
          <label>Staff Name (Eng)
            <input id="staff-nameeng" type="text" placeholder="optional">
          </label>
          <label>Staff Name (Chi)
            <input id="staff-namechi" type="text" placeholder="optional">
          </label>
          <label>Display Name
            <input id="staff-displayname" type="text" placeholder="optional">
          </label>
          <label>Domain Name
            <input id="staff-domainname" type="text" placeholder="optional">
          </label>
          <button id="save-staff" type="button">Save Staff</button>
        </div>
        <p class="hint">Only Staff No is required. If your DB still has NOT NULL on other columns, run latest schema init/migration first.</p>
        <div id="staff-msg" class="msg"></div>
      </section>
      <section class="card">
        <h2>Current Staff</h2>
        <div id="staff-list"></div>
      </section>
    </section>
  </main>
  <script src="./app.js"></script>
</body>
</html>
