<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OT Calculator</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <main>
    <h1>OT Calculator (UAT)</h1>

    <section>
      <h2>OT Entries</h2>
      <button id="add-ot" type="button">Add OT Entry</button>
      <table>
        <thead>
          <tr><th>Employee</th><th>Date</th><th>Start</th><th>End</th><th>Action</th></tr>
        </thead>
        <tbody id="ot-body"></tbody>
      </table>
    </section>

    <section>
      <h2>Break Entries</h2>
      <button id="add-break" type="button">Add Break Entry</button>
      <table>
        <thead>
          <tr><th>Employee</th><th>Date</th><th>Start</th><th>End</th><th>Action</th></tr>
        </thead>
        <tbody id="break-body"></tbody>
      </table>
    </section>

    <section>
      <h2>Daily Summary</h2>
      <div id="daily-results"></div>
    </section>

    <section>
      <h2>Monthly Summary</h2>
      <div id="monthly-results"></div>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
