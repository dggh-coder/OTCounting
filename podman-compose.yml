version: "3.9"
services:
  opengauss:
    image: docker.io/opengauss/opengauss-server:latest
    container_name: ot-opengauss
    privileged: true
    shm_size: "1g"
    env_file:
      - ./opengauss.env
    ports:
      - "5432:5432"
    volumes:
      - ogdata:/var/lib/opengauss
      - ./deploy/opengauss-init:/docker-entrypoint-initdb.d:ro

  ot-backend:
    build:
      context: ./ot-backend
    container_name: ot-backend
    environment:
      DATABASE_URL: postgres://omm:${OT_DB_PASSWORD}@opengauss:5432/postgres?sslmode=disable
    depends_on:
      - opengauss
    ports:
      - "8080:8080"

  ot-frontend:
    build:
      context: ./ot-frontend
    container_name: ot-frontend
    depends_on:
      - ot-backend
    ports:
      - "8081:8081"

volumes:
  ogdata:
